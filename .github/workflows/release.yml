name: Release

# Publishes the `agent-lens` CLI to npm via semantic-release on every push to main.
# Conventional-commit history drives the version bump, changelog, git tag, and GitHub release.
# The full test + tarball gate must pass before anything is published.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping releases racing on the same tag/version.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # semantic-release commits the changelog + version bump and pushes the tag
  issues: write # comments on released issues/PRs
  pull-requests: write
  id-token: write # npm provenance / OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Exposed here so the release step's `if:` can detect whether the secret is configured.
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
          persist-credentials: true

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          # See ci.yml: disable v5 auto package-manager cache (corepack enables pnpm below).
          package-manager-cache: false

      - name: Enable corepack (pnpm pinned via package.json packageManager)
        run: corepack enable

      - name: Locate pnpm store
        id: pnpm
        run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm.outputs.dir }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      # --- Gate: nothing publishes unless the build, tests, and the from-tarball smoke all pass ---
      - run: pnpm build
      - run: pnpm test # builds all packages + vitest (corpus-scenarios, determinism, redaction)
      - name: Global-install tarball smoke (real npm i -g, exercises better-sqlite3 prebuild)
        run: node scripts/smoke-tarball.mjs --global

      # --- Release: semantic-release computes the version, publishes to npm, tags, GH release ---
      # Skipped (workflow stays green) until NPM_TOKEN is configured as a repo secret. The v0.1.0
      # baseline tag must already be pushed so semantic-release never cuts a from-scratch release.
      - name: semantic-release
        if: ${{ env.NPM_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: pnpm exec semantic-release
