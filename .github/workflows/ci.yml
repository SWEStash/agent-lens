name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          # setup-node@v5 auto-detects the packageManager (pnpm) and would try to prime its cache
          # before corepack enables pnpm below — disable it; caching is done manually via actions/cache.
          package-manager-cache: false

      - name: Enable corepack (pnpm pinned via package.json packageManager)
        run: corepack enable

      - name: Locate pnpm store
        id: pnpm
        run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm.outputs.dir }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test # builds all packages + vitest (incl. corpus-scenarios, determinism, redaction)

      # A new SPA endpoint missing from export-snapshot.mjs (or a snapshotFileKey collision) fails
      # here instead of 404ing the live GitHub Pages demo — only the Pages job ran this before.
      - name: Export the demo snapshot (guards the Pages build)
        run: node scripts/export-snapshot.mjs

      - name: Build the static SPA in snapshot mode (catches snapshot-path breakage the default build misses)
        env:
          VITE_SNAPSHOT: "1"
          VITE_BASE: /agent-lens/
        run: pnpm --filter @agent-lens/web build

      - name: From-tarball smoke (packs the CLI, runs collect→ingest→serve with no repo present)
        run: node scripts/smoke-tarball.mjs

      - name: sqlite3 CLI (for the sandbox harness)
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Sandbox e2e over the committed corpus
        run: bash scripts/sandbox.sh

      - name: Invariant validation over a freshly-ingested corpus DB
        run: |
          cat > /tmp/corpus-sources.json <<'JSON'
          { "sources": [
            { "label": "team-a",    "agent": "claude-code", "configDir": "/unused" },
            { "label": "team-b",    "agent": "claude-code", "configDir": "/unused" },
            { "label": "scenarios", "agent": "claude-code", "configDir": "/unused" }
          ] }
          JSON
          AGENT_LENS_CONFIG=/tmp/corpus-sources.json \
            node packages/ingest/dist/index.js --full --db /tmp/corpus.db --archive test/fixtures/corpus
          node scripts/validate.mjs --db /tmp/corpus.db
