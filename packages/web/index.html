<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%BASE_URL%favicon-16.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <title>Agent Lens</title>
    <!-- Apply the saved theme before first paint to avoid a flash. Default is dark. -->
    <script>
      try {
        var t = localStorage.getItem("agentlens.theme");
        document.documentElement.dataset.theme = t === "light" ? "light" : "dark";
      } catch (e) {
        document.documentElement.dataset.theme = "dark";
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
